name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name="Mark-Those-things-up" --collect-all markitdown --collect-all magika app.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Mark Those things up v1.0.${{ github.run_number }}
        body: |
          Automated build of Mark Those things up compiled for Windows architecture.
          
          **Assets included:**
          * Standalone executable with Magika models embedded.
        draft: false
        prerelease: false
        files: dist/*.exe  # Uses a wildcard to guarantee it grabs the compiled executable