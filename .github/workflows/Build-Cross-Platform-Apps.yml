name: Build Cross-Platform Apps

on:
  workflow_dispatch:

jobs:
  # JOB 1: Compiles the Windows Executable
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Run PyInstaller (Windows)
      run: |
        python -m PyInstaller --onefile --noconsole --name="Mark-Those-things-up" --add-data "logo.png;." --collect-all markitdown --collect-all magika app.py
        
    - name: Upload Windows Staging Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-bin
        path: dist/Mark-Those-things-up.exe

  # JOB 2: Compiles the macOS Executable
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt

    - name: Run PyInstaller and Compress (macOS)
      run: |
        python3 -m PyInstaller --onefile --windowed --name="Mark-Those-things-up" --add-data "logo.png:." --collect-all markitdown --collect-all magika app.py
        cd dist
        zip -r ../Mark-Those-things-up-Mac.zip Mark-Those-things-up.app

    - name: Upload macOS Staging Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-bin
        path: Mark-Those-things-up-Mac.zip

  # JOB 3: Collects both files and deploys a single unified release
  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Windows Asset
      uses: actions/download-artifact@v4
      with:
        name: windows-bin
        path: ./release-payload

    - name: Download macOS Asset
      uses: actions/download-artifact@v4
      with:
        name: macos-bin
        path: ./release-payload

    - name: Create Unified GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.5.${{ github.run_number }}
        name: Mark Those things up v1.5.${{ github.run_number }}
        body: |
          Official cross-platform production release of **Mark Those things up**.
          
          ### Download Assets 📦
          * **Windows:** Download `Mark-Those-things-up.exe`
          * **macOS:** Download `Mark-Those-things-up-Mac.zip`
        draft: false
        prerelease: false
        files: ./release-payload/*